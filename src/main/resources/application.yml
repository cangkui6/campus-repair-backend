spring:
  application:
    name: repair-backend
  profiles:
    active: dev

server:
  port: 8080
  servlet:
    context-path: /

security:
  jwt:
    secret: ${JWT_SECRET:change-me-change-me-change-me-change-me-change-me-change-me-123456}
    expire-seconds: ${JWT_EXPIRE_SECONDS:86400}

rag:
  enabled: false
  base-url: http://localhost:9001
  retrieve-path: /api/v1/rag/retrieve
  health-path: /api/v1/rag/health
  top-k: 4
  timeout-seconds: 5
