spring:
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/campus_repair?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  sql:
    init:
      mode: always
      schema-locations: classpath:sql/schema.sql
      data-locations: classpath:sql/data.sql
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true

llm:
  base-url: https://open.bigmodel.cn/api/paas/v4
  chat-path: /chat/completions
  model: ${LLM_MODEL:glm-4-air-250414}
  prompt:
    parse-version: parse-v2
    classify-version: classify-v1
  api-key: ${LLM_API_KEY:}
  timeout-seconds: ${LLM_TIMEOUT_SECONDS:30}

rag:
  enabled: true
  base-url: http://localhost:9001
  retrieve-path: /api/v1/rag/retrieve
  health-path: /api/v1/rag/health
  top-k: 4
  timeout-seconds: 5
